<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Login - Sistema de Reclutamiento</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/startbootstrap-sb-admin-2/4.1.4/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            display: flex;
        }
        .login-image {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: white;
        }
        .login-image i {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .login-form {
            flex: 1;
            padding: 40px;
        }
        .form-control {
            border-radius: 5px;
            padding: 12px;
            border: 1px solid #ddd;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .btn-login:hover {
            opacity: 0.9;
        }
        .brand-text {
            font-size: 24px;
            font-weight: 800;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="login-container">
            <div class="login-image d-none d-md-flex flex-column align-items-center justify-content-center">
                <i class="fas fa-users"></i>
                <h2 class="brand-text">Sistema de Reclutamiento</h2>
                <p>GestiÃ³n de talento humano</p>
            </div>
            <div class="login-form">
                <div class="text-center mb-4">
                    <h4 class="text-gray-900">Bienvenido</h4>
                    <p class="text-muted">Ingresa tus credenciales</p>
                </div>

                <div id="alertContainer"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="tu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">ContraseÃ±a</label>
                        <input type="password" class="form-control" id="password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-login btn-block">
                        <i class="fas fa-sign-in-alt"></i> Iniciar SesiÃ³n
                    </button>
                </form>

                <hr>

                <div class="text-center">
                    <small class="text-muted">Credenciales de prueba:</small><br>
                    <small class="text-muted">Admin: admin@reclutamiento.com / admin123</small><br>
                    <small class="text-muted">Reclutador: reclutador@reclutamiento.com / reclutador123</small>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
            
            try {
                const usuario = await API.login(email, password);
                
                // Guardar usuario en localStorage
                localStorage.setItem('usuario', JSON.stringify(usuario));
                
                API.mostrarAlerta('Â¡Bienvenido ' + usuario.nombre + '!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (error) {
                API.mostrarAlerta(error.message, 'danger');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar SesiÃ³n';
            }
        });

        // Verificar si ya estÃ¡ logueado
        if (localStorage.getItem('usuario')) {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
