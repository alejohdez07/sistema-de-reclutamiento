                        <div class="card-header py-3"><h6 class="m-0 font-weight-bold text-primary">Datos del Candidato</h6></div>
                        <div class="card-body">
                            <form id="candidatoForm">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group"><label>Nombre *</label><input type="text" class="form-control" id="nombre" required></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group"><label>Apellido *</label><input type="text" class="form-control" id="apellido" required></div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group"><label>Email *</label><input type="email" class="form-control" id="email" required></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group"><label>TelÃ©fono</label><input type="text" class="form-control" id="telefono"></div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group"><label>Documento de Identidad</label><input type="text" class="form-control" id="documento_identidad"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group"><label>Ciudad</label><input type="text" class="form-control" id="ciudad"></div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group"><label>LinkedIn</label><input type="url" class="form-control" id="linkedin" placeholder="https://linkedin.com/in/..."></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group"><label>Estado</label><select class="form-control" id="estado"><option value="activo">Activo</option><option value="inactivo">Inactivo</option></select></div>
                                    </div>
                                </div>
                                <div class="form-group"><label>DirecciÃ³n</label><input type="text" class="form-control" id="direccion"></div>
                                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar Candidato</button>
                                <a href="listar-candidatos.html" class="btn btn-secondary">Cancelar</a>
                            </form>
                        </div>
                    </div>
                </div>

            <footer class="sticky-footer bg-white"><div class="container my-auto"><div class="copyright text-center my-auto"><span>Sistema de Reclutamiento &copy; 2024</span></div></div></footer>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script>
        const usuario=JSON.parse(localStorage.getItem('usuario'));if(!usuario){window.location.href='../login.html'}else{document.getElementById('nombreUsuario').textContent=usuario.nombre}
        function cerrarSesion(){localStorage.removeItem('usuario');window.location.href='../login.html'}
        document.getElementById('candidatoForm').addEventListener('submit',async(e)=>{e.preventDefault();const btn=e.target.querySelector('button');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Guardando...';try{const datos={nombre:document.getElementById('nombre').value,apellido:document.getElementById('apellido').value,email:document.getElementById('email').value,telefono:document.getElementById('telefono').value,documento_identidad:document.getElementById('documento_identidad').value,ciudad:document.getElementById('ciudad').value,linkedin:document.getElementById('linkedin').value,direccion:document.getElementById('direccion').value,estado:document.getElementById('estado').value};await API.crearCandidato(datos);API.mostrarAlerta('Candidato creado exitosamente','success');setTimeout(()=>window.location.href='listar-candidatos.html',1500)}catch(error){API.mostrarAlerta(error.message,'danger');btn.disabled=false;btn.innerHTML='<i class="fas fa-save"></i> Guardar Candidato'}});
    </script>
