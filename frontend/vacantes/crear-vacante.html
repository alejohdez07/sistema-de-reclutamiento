<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nueva Vacante</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/startbootstrap-sb-admin-2/4.1.4/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Nunito',sans-serif}.bg-gradient-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}</style>
</head>
<body id="page-top">
    <div id="wrapper">
        <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
            <a class="sidebar-brand d-flex align-items-center justify-content-center" href="../index.html">
                <div class="sidebar-brand-icon rotate-n-15"><i class="fas fa-users"></i></div>
                <div class="sidebar-brand-text mx-3">Reclutamiento</div>
            </a>
            <hr class="sidebar-divider my-0">
            <li class="nav-item"><a class="nav-link" href="../index.html"><i class="fas fa-fw fa-tachometer-alt"></i><span>Dashboard</span></a></li>
            <hr class="sidebar-divider">
            <div class="sidebar-heading">Módulos</div>
            <li class="nav-item">
                <a class="nav-link collapsed" href="#" data-toggle="collapse" data-target="#collapseCandidatos">
                    <i class="fas fa-fw fa-user-tie"></i><span>Candidatos</span>
                </a>
                <div id="collapseCandidatos" class="collapse" data-parent="#accordionSidebar">
                    <div class="bg-white py-2 collapse-inner rounded">
                        <a class="collapse-item" href="../candidatos/listar-candidatos.html">Ver Candidatos</a>
                        <a class="collapse-item" href="../candidatos/crear-candidato.html">Nuevo Candidato</a>
                    </div>
                </div>
            </li>
            <li class="nav-item active">
                <a class="nav-link collapsed" href="#" data-toggle="collapse" data-target="#collapseVacantes">
                    <i class="fas fa-fw fa-briefcase"></i><span>Vacantes</span>
                </a>
                <div id="collapseVacantes" class="collapse show" data-parent="#accordionSidebar">
                    <div class="bg-white py-2 collapse-inner rounded">
                        <a class="collapse-item" href="listar-vacantes.html">Ver Vacantes</a>
                        <a class="collapse-item active" href="crear-vacante.html">Nueva Vacante</a>
                    </div>
                </div>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="../postulaciones/listar-postulaciones.html">
                    <i class="fas fa-fw fa-file-alt"></i><span>Postulaciones</span>
                </a>
            </li>
            <hr class="sidebar-divider">
            <div class="text-center d-none d-md-inline"><button class="rounded-circle border-0" id="sidebarToggle"></button></div>
        </ul>
        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">
                    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3"><i class="fa fa-bars"></i></button>
                    <ul class="navbar-nav ml-auto">
                        <div class="topbar-divider d-none d-sm-block"></div>
                        <li class="nav-item dropdown no-arrow">
                            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-toggle="dropdown">
                                <span class="mr-2 d-none d-lg-inline text-gray-600 small" id="nombreUsuario">Usuario</span>
                            </a>
                            <div class="dropdown-menu dropdown-menu-right shadow animated--grow-in">
                                <a class="dropdown-item" href="#" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt fa-sm fa-fw mr-2 text-gray-400"></i>Logout</a>
                            </div>
                        </li>
                    </ul>
                </nav>
                <div class="container-fluid">
                    <div class="d-sm-flex align-items-center justify-content-between mb-4">
                        <h1 class="h3 mb-0 text-gray-800">Nueva Vacante</h1>
                    </div>
                    <div id="alertContainer"></div>
                    <div class="card shadow mb-4">
                        <div class="card-header py-3"><h6 class="m-0 font-weight-bold text-primary">Datos de la Vacante</h6></div>
                        <div class="card-body">
                            <form id="vacanteForm">
                                <div class="row">
                                    <div class="col-md-8">
                                        <div class="form-group"><label>Título *</label><input type="text" class="form-control" id="titulo" required></div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="form-group"><label>Área</label><input type="text" class="form-control" id="area" placeholder="Ej: Tecnología, Marketing"></div>
                                    </div>
                                </div>
                                <div class="form-group"><label>Descripción *</label><textarea class="form-control" id="descripcion" rows="3" required></textarea></div>
                                <div class="form-group"><label>Requisitos</label><textarea class="form-control" id="requisitos" rows="3" placeholder="Lista de requisitos..."></textarea></div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group"><label>Ubicación</label><input type="text" class="form-control" id="ubicacion" placeholder="Ciudad, País"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group"><label>Tipo de Contrato</label><select class="form-control" id="tipo_contrato"><option value="">Seleccionar...</option><option value="Tiempo completo">Tiempo completo</option><option value="Medio tiempo">Medio tiempo</option><option value="Contrato">Contrato</option><option value="Freelance">Freelance</option></select></div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-4">
                                        <div class="form-group"><label>Salario Mínimo</label><input type="number" class="form-control" id="salario_min"></div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="form-group"><label>Salario Máximo</label><input type="number" class="form-control" id="salario_max"></div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="form-group"><label>Nivel de Experiencia</label><select class="form-control" id="nivel_experiencia"><option value="">Seleccionar...</option><option value="Junior">Junior</option><option value="Semi-senior">Semi-senior</option><option value="Senior">Senior</option></select></div>
                                    </div>
                                </div>
                                <div class="form-group"><label>Estado</label><select class="form-control" id="estado"><option value="activa">Activa</option><option value="inactiva">Inactiva</option><option value="cerrada">Cerrada</option></select></div>
                                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar Vacante</button>
                                <a href="listar-vacantes.html" class="btn btn-secondary">Cancelar</a>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <footer class="sticky-footer bg-white"><div class="container my-auto"><div class="copyright text-center my-auto"><span>Sistema de Reclutamiento &copy; 2024</span></div></div></footer>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script>
        const usuario=JSON.parse(localStorage.getItem('usuario'));if(!usuario){window.location.href='../login.html'}else{document.getElementById('nombreUsuario').textContent=usuario.nombre}
        function cerrarSesion(){localStorage.removeItem('usuario');window.location.href='../login.html'}
        document.getElementById('vacanteForm').addEventListener('submit',async(e)=>{e.preventDefault();const btn=e.target.querySelector('button');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Guardando...';try{const datos={titulo:document.getElementById('titulo').value,descripcion:document.getElementById('descripcion').value,requisitos:document.getElementById('requisitos').value,ubicacion:document.getElementById('ubicacion').value,tipo_contrato:document.getElementById('tipo_contrato').value,salario_min:document.getElementById('salario_min').value,salario_max:document.getElementById('salario_max').value,area:document.getElementById('area').value,nivel_experiencia:document.getElementById('nivel_experiencia').value,estado:document.getElementById('estado').value};await API.crearVacante(datos);API.mostrarAlerta('Vacante creada exitosamente','success');setTimeout(()=>window.location.href='listar-vacantes.html',1500)}catch(error){API.mostrarAlerta(error.message,'danger');btn.disabled=false;btn.innerHTML='<i class="fas fa-save"></i> Guardar Vacante'}});
    </script>
</body>
</html>
